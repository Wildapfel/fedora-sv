[ids]
*

[main]

leftalt = overload(brackets, leftalt)
rightalt = overload(brackets, leftalt)

[brackets:leftalt]

# default
` = macro(leftalt+`)

# default
tab = macro(leftalt+tab)

# default
1 = macro(leftalt+1)

# default
2 = macro(leftalt+2)

# default
3 = macro(leftalt+3)

# default
4 = macro(leftalt+4)

# default
5 = macro(leftalt+5)

# default
6 = macro(leftalt+6)

# default
up = macro(leftalt+up)

# default
left = macro(leftalt+left)

# default
down = macro(leftalt+down)

# default
space = macro(leftalt+space)

# default
right = macro(leftalt+right)

# {
7 = macro(rightalt+7)

# [
8 = macro(rightalt+8)

# ]
9 = macro(rightalt+9)

# }
0 = macro(rightalt+0)

# @
q = macro(rightalt+q)

# €
e = macro(rightalt+e)

# ~
] = macro(rightalt+])

# ¸ (´`)
- = macro(rightalt+-)

# \ (?, ß)
= = macro(rightalt+=)

